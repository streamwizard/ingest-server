name: Build and push images

# Builds the three ingest-server service images and pushes them to GHCR so
# nodes can `docker compose pull` a prebuilt image instead of building from
# source on the box (see scripts/install.sh).
on:
  push:
    branches: [main]
    paths:
      - "apps/ingest-control/**"
      - "apps/ingest-media/**"
      - "docker/stream-server/srtla/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/build-images.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: ingest-control
            context: .
            dockerfile: apps/ingest-control/Dockerfile
          - image: ingest-media
            context: .
            dockerfile: apps/ingest-media/Dockerfile
          - image: srtla-receiver
            context: docker/stream-server/srtla
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/streamwizard/${{ matrix.image }}:latest
            ghcr.io/streamwizard/${{ matrix.image }}:sha-${{ steps.vars.outputs.sha_short }}
