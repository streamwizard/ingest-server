# StreamWizard ingest stack — runs on the dedicated stream box (NOT Dokploy).
#
# Brings up the control plane (Bun), the media plane (Python/GStreamer), and the
# Belabox SRTLA receiver on a shared bridge network. Per-streamer OBS containers
# are launched dynamically by the control plane (via the Docker socket) and join
# the same `stream-server` network — they are intentionally NOT defined here.
#
# Images are prebuilt by .github/workflows/build-images.yml and pulled from
# GHCR -- nothing here is built locally. Copy .env.example to .env and fill
# it in before `docker compose up`. Set INGEST_IMAGE_TAG in .env to pin a
# node to a specific build (e.g. sha-abc1234); leave it blank to track
# :latest.

services:
  ingest-control:
    image: ghcr.io/streamwizard/ingest-control:${INGEST_IMAGE_TAG:-latest}
    env_file:
      - ../../.env
    # The host bandwidth sampler lives here, but the SRT ingest arrives in
    # ingest-media's network namespace — a bridge container only sees its own
    # eth0, so rx/tx read as a trickle. pid:host lets the sampler read the host
    # root netns (init = PID 1) via HOST_NET_DEV and report real NIC counters.
    # Networking is unchanged: this stays on the bridge, so ingest-media still
    # reaches it at http://ingest-control:8090.
    pid: host
    environment:
      HOST_NET_DEV: /proc/1/net/dev
    ports:
      # /health for the monitoring alerter — published ONLY on the Tailscale
      # interface, same pattern as ingest-media's OBS output port below.
      - "${TAILSCALE_IP}:8090:8090"
    networks:
      - stream-server
    restart: unless-stopped

  ingest-media:
    image: ghcr.io/streamwizard/ingest-media:${INGEST_IMAGE_TAG:-latest}
    env_file:
      - ../../.env
    ports:
      - "8888:8888/udp"   # public SRT ingest
      # Output OBS pulls from — published ONLY on the Tailscale interface so it
      # is never exposed to the public internet. Set TAILSCALE_IP in .env to the
      # VM's Tailscale address.
      - "${TAILSCALE_IP}:9000:9000/udp"
    networks:
      - stream-server
    depends_on:
      - ingest-control
    restart: unless-stopped

  srtla-receiver:
    image: ghcr.io/streamwizard/srtla-receiver:${INGEST_IMAGE_TAG:-latest}
    command: ["5000", "ingest-media", "8889"]
    ports:
      - "5000:5000/udp"   # public SRTLA ingest
    networks:
      - stream-server
    depends_on:
      - ingest-media
    restart: unless-stopped

networks:
  stream-server:
    name: stream-server
    driver: bridge
