# StreamWizard ingest stack — runs on the dedicated stream box (NOT Dokploy).
#
# Brings up the control plane (Bun), the media plane (Python/GStreamer), and the
# Belabox SRTLA receiver on a shared bridge network. Per-streamer OBS containers
# are launched dynamically by the control plane (via the Docker socket) and join
# the same `stream-server` network — they are intentionally NOT defined here.
#
# Build context for the app images is the repo root (../..). Copy .env.example
# to .env and fill it in before `docker compose up`.

services:
  ingest-control:
    build:
      context: ../..
      dockerfile: apps/ingest-control/Dockerfile
    env_file:
      - ../../.env
    networks:
      - stream-server
    restart: unless-stopped

  ingest-media:
    build:
      context: ../..
      dockerfile: apps/ingest-media/Dockerfile
    env_file:
      - ../../.env
    ports:
      - "8888:8888/udp"   # public SRT ingest
      # Output OBS pulls from — published ONLY on the Tailscale interface so it
      # is never exposed to the public internet. Set TAILSCALE_IP in .env to the
      # VM's Tailscale address.
      - "${TAILSCALE_IP}:9000:9000/udp"
    networks:
      - stream-server
    depends_on:
      - ingest-control
    restart: unless-stopped

  srtla-receiver:
    build:
      context: ./srtla
      dockerfile: Dockerfile
    command: ["5000", "ingest-media", "8889"]
    ports:
      - "5000:5000/udp"   # public SRTLA ingest
    networks:
      - stream-server
    depends_on:
      - ingest-media
    restart: unless-stopped

networks:
  stream-server:
    name: stream-server
    driver: bridge
