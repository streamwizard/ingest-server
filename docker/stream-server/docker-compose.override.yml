# Local override — run the ingest stack with plain env vars instead of Doppler.
#
# Auto-merged by `docker compose up`. Overrides the control plane's Doppler
# entrypoint with a direct `bun run start`, and injects Supabase creds (which
# Doppler would normally supply) straight from .env. Pointed at the host's local
# Supabase via host.docker.internal.
#
# This file is for local development only — production on the stream box uses the
# base docker-compose.yml with a real DOPPLER_TOKEN.

services:
  ingest-control:
    # Skip `doppler run --`; run the app directly.
    entrypoint: ["bun", "run", "start"]
    environment:
      SUPABASE_URL: http://host.docker.internal:54321
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
    extra_hosts:
      # Let the container reach the host's local Supabase.
      - "host.docker.internal:host-gateway"

# Locally there's no Tailscale, so leave TAILSCALE_IP empty in .env — the base
# compose then publishes the :9000 output port on all interfaces, and a local
# OBS/ffplay can pull from srt://127.0.0.1:9000?streamid=<output-key> (the output
# key must exist in ingest_output_keys for a currently-live stream).
